name: Weekly Swiss API Update

on:
  schedule:
    - cron: "0 1 * * 0"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: weekly-swiss-api-update
  cancel-in-progress: true

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 120

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install requests cloudscraper beautifulsoup4 pandas openpyxl

      - name: Run weekly Swiss API refresh
        env:
          API_BASE: ${{ secrets.TRANSFERMARKT_API_BASE }}
        run: python weekly_update_api.py

      - name: Commit updated DB
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add schweizer_fussball_grid.db
          git commit -m "Weekly Swiss API update $(date -u +'%Y-%m-%d %H:%M UTC')" || echo "No DB changes"
          git push
